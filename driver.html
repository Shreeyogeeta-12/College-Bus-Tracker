<!DOCTYPE html>
<html>
<head>
  <title>Driver - Bus Tracker</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; background: #f0f0f0; }
    h1 { color: #333; }
    button {
      padding: 20px 40px;
      font-size: 1.2rem;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #startBtn { background: #2ecc71; color: white; }
    #stopBtn  { background: #e74c3c; color: white; }
    #status   { margin-top: 20px; font-size: 1rem; color: #555; }
  </style>
</head>
<body>

  <h1>🚌 Bus Driver Panel</h1>
  <p>Press Start to share your live location</p>

  <button id="startBtn" onclick="startTracking()">▶ Start</button>
  <button id="stopBtn"  onclick="stopTracking()">⏹ Stop</button>

  <div id="status">Status: Not started</div>

  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      databaseURL: "https://college-bus-tracker-11fce-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let watchId = null;

    function startTracking() {
      document.getElementById('status').innerText = '📡 Sharing location...';
      watchId = navigator.geolocation.watchPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        db.ref('liveLocation/bus1').set({ lat, lng });
        document.getElementById('status').innerText = '✅ Live: ' + lat.toFixed(4) + ', ' + lng.toFixed(4);
      });
    }

    function stopTracking() {
      navigator.geolocation.clearWatch(watchId);
      db.ref('liveLocation/bus1').remove();
      document.getElementById('status').innerText = '⛔ Stopped';
    }
  </script>

</body>
</html>
