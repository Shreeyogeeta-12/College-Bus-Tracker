    #eta { font-size: 0.8rem; color: #e74c3c; font-weight: bold; margin-top: 4px; }
  </style>
</head>
<body>

<div id="topbar">

</select>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>

<script>
  firebase.initializeApp({

  const map = L.map('map', {

    maxBounds: [[15.6200, 74.3800],[15.9600, 74.6500]],

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {

}).addTo(map);

 const busData = {

    bus3:  { name: "Hanuman Nagar", driver: "Ragavendra Deepak N", phone: "8073035140", time: "7:50 AM" },
    bus4:  { name: "Vadagaon", driver: "Kannappa Baganal", phone: "9964810056", time: "7:50 AM" },

    bus6:  { name: "Vadagaon (Alt)", driver: "V. S. Kambar", phone: "9663763819", time: "7:50 AM" },
    bus7:  { name: "Khanapur", driver: "New Staff", phone: "—", time: "7:40 AM" },
    bus8:  { name: "CBT / RTO", driver: "Vinod Arjun Patil", phone: "7338667662", time: "7:50 AM" },
    bus9:  { name: "Marihal", driver: "Ravi Dandagal", phone: "8197297335", time: "9:00 AM" },
    bus10: { name: "Khanapur (Alt)", driver: "Bharama D", phone: "9985166439", time: "9:00 AM" },
    bus11: { name: "RC Nagar", driver: "Manjunath Mailannavar", phone: "9972781413", time: "7:50 AM" },
    bus12: { name: "Shahu Nagar", driver: "Praveen Shivaji Tupare", phone: "9902949685", time: "7:40 AM" },
    bus13: { name: "Uchagoan", driver: "Bharat N. Dhangavde", phone: "9844614143", time: "7:30 AM" },
    bus14: { name: "Shahapur", driver: "Sanjay Tarihalkar", phone: "9886867705", time: "7:50 AM" },
    bus15: { name: "Kakati", driver: "C. I. Sangammanavar", phone: "9008808351", time: "7:40 AM" },
    bus16: { name: "Ramteerth Nagar", driver: "Babu P. Chalvatkar", phone: "9686149872", time: "7:50 AM" }
  };

  stops.forEach((stop, i) => {
    const color = i === 0 ? 'red' : 'blue';
    const html = `<div style="background:${color};width:10px;height:10px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.5)"></div>`;
    const icon = L.divIcon({ className: '', html, iconSize: [10,10], iconAnchor: [5,5] });
    L.marker([stop.lat, stop.lng], { icon }).addTo(map).bindPopup('<b>🚏 ' + stop.name + '</b>');
  });

  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function calculateETA(busLat, busLng) {
    const dist = getDistance(busLat, busLng, 15.8155, 74.4868);
    const mins = Math.round((dist / 30) * 60);
    if (mins <= 1) return '🏫 Arrived at College!';
    if (mins > 120) return '⏱️ More than 2 hrs away';
    return '⏱️ ETA to College: ' + mins + ' mins';
  }

  let busMarker = null;
  let currentListener = null;

  function selectBus() {
    const selectedBus = document.getElementById('busSelect').value;
    if (!selectedBus) return;
    const bus = busData[selectedBus];
    document.getElementById('info').innerText = '🔍 Looking for ' + bus.name + '...';
    document.getElementById('driverInfo').innerText = '👤 ' + bus.driver + '  📞 ' + bus.phone + '  ⏰ ' + bus.time;
    document.getElementById('eta').innerText = '';
    if (busMarker) { map.removeLayer(busMarker); busMarker = null; }
    if (currentListener) currentListener.off();
    currentListener = db.ref('liveLocation/' + selectedBus);
    currentListener.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const { lat, lng } = data;
        document.getElementById('info').innerText = '🟢 ' + bus.name + ' is LIVE!';
        document.getElementById('eta').innerText = calculateETA(lat, lng);
        const busIcon = L.divIcon({
          className: '',
          html: '<div style="font-size:2rem;filter:drop-shadow(2px 2px 2px rgba(0,0,0,0.5))">🚌</div>',
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        });
        if (!busMarker) {
          busMarker = L.marker([lat, lng], {icon: busIcon}).addTo(map).bindPopup(bus.name).openPopup();
        } else {
          busMarker.setLatLng([lat, lng]);
        }
        map.setView([lat, lng], 15);
      } else {
        document.getElementById('info').innerText = '🔴 ' + bus.name + ' not live yet';
        document.getElementById('eta').innerText = '';
      }
    });
  }
</script>
